name: Scrape M-League Results

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/scrape.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/results.json public/images/players/
          git diff --staged --quiet || git commit -m "chore: update match results $(date +'%Y-%m-%d')"
          git push
